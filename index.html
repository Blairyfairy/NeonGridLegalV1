<html lang="en">
<head>

<style>
:root {
  --bg: #0a0e1b;
  --primary: #00b5d9;
  --secondary: #5e3eff;
  --accent: #00c988;
  --text: #dce6f2;
  --muted: #7a8699;
  --glass-bg: rgba(10,14,27,0.55);
  --glass-blur: blur(12px);
  --logo-star: #FFD700;
  --logo-gradient: linear-gradient(90deg, #00b5d9, #00c988);
}

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  scroll-behavior: smooth;
}

/* Links */
a {
  text-decoration: none;
  transition: 0.3s;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 6%;
  background: rgba(10,14,27,0.7);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
  font-weight: 700;
  font-size: 1.6rem;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo svg {
  fill: var(--logo-star);
}

.logo span {
  background: var(--logo-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav a {
  margin-left: 20px;
  color: var(--text);
  font-weight: 500;
}

nav a.contact-btn {
  display: inline-block;
  padding: 7px 16px;
  border-radius: 40px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: var(--text);
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: 0.3s;
  font-size: 0.9rem;
}

nav a.contact-btn:hover {
  opacity: 0.85;
  transform: translateY(-2px);
}

nav a:hover {
  color: var(--accent);
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 120px 6% 80px;
  background: url('https://images.pexels.com/photos/18172216/pexels-photo-18172216.jpeg') no-repeat center/cover; /* neon blue keyboard background */
  background-blend-mode: overlay;
  background-color: rgba(10,14,27,0.65);
  position: relative;
}

.hero h1 {
  font-size: 2.8rem;
  line-height: 1.2;
  margin-bottom: 20px;
}

.hero p {
  color: var(--muted);
  max-width: 720px;
  margin: auto;
  font-size: 1.1rem;
}

.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 32px;
  border-radius: 40px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: var(--text);
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.85;
  transform: translateY(-2px);
}

/* Section Headings */
section {
  padding: 80px 6%;
}

h2 {
  margin-bottom: 40px;
  font-size: 2rem;
  text-align: center;
  color: var(--primary);
  position: relative;
}

h2::after {
  content: '';
  width: 60px;
  height: 3px;
  background: var(--accent);
  display: block;
  margin: 10px auto 0;
  border-radius: 2px;
}

/* Grid Layout */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  padding: 28px;
  border-radius: 16px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0,181,217,0.2);
}

.card h3 {
  margin-bottom: 12px;
  color: var(--accent);
  font-size: 1.25rem;
  display: flex;
  align-items: center;
}

.card h3 svg {
  margin-right: 8px;
  width: 20px;
  height: 20px;
  fill: var(--accent);
}

/* Blog */
.blog article {
  margin-bottom: 24px;
  padding: 20px;
  background: var(--glass-bg);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
}

.blog article:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 20px rgba(94,62,255,0.2);
}

/* Contact */
.contact input,
.contact textarea {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  background: #060811;
  border: 1px solid #1f2937;
  color: var(--text);
  border-radius: 8px;
  font-size: 1rem;
}

.contact button {
  width: 100%;
  padding: 14px;
  border: none;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: var(--text);
  font-weight: 600;
  border-radius: 40px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

.contact button:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}

/* Footer */
footer {
  text-align: center;
  padding: 60px 6%;
  background: #060811;
  color: var(--muted);
  font-size: 0.9rem;
}

/* Back to Top Button */
#backToTop {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 48px;
  height: 48px;
  z-index: 1000;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.3s;
}

#backToTop:hover {
  transform: scale(1.1);
}

#backToTop::after {
  content: '▲';
  color: var(--text);
  font-size: 1rem;
}
